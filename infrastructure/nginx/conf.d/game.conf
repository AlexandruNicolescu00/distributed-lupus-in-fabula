# ─────────────────────────────────────────────────────────────────────────────
# Virtual host principale.
# Gestisce tre piani di traffico separati:
#   /ws/*    → WebSocket verso backend (upgrade HTTP→WS)
#   /api/*   → REST API verso backend
#   /        → Frontend Vue (SPA)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Sicurezza header ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;
    # Rimosso Strict-Transport-Security: vale solo su HTTPS


    # ══════════════════════════════════════════════════════════════════════════
    # WEBSOCKET  →  /ws/<room_id>
    # ══════════════════════════════════════════════════════════════════════════
    #
    # Il client si connette a:
    #   ws://host/ws/room_42?client_id=xxx
    # NGINX esegue l'upgrade e instrada al backend corretto.
    #
    # Flusso handshake:
    #   1. Client invia GET /ws/room_42 con header:
    #        Upgrade: websocket
    #        Connection: Upgrade
    #   2. NGINX forwarda al backend con gli stessi header
    #   3. Backend risponde 101 Switching Protocols
    #   4. NGINX diventa un tunnel trasparente per i frame WS

    location /ws/ {
        proxy_pass         http://backend_ws;
        proxy_http_version 1.1;

        # ── Header obbligatori per l'upgrade ─────────────────────────────────
        # Senza questi due header il backend non completa il WS handshake.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # ── Header di forwarding ──────────────────────────────────────────────
        # Il backend li usa per identificare il client reale (logging, auth).
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # ── Timeout ───────────────────────────────────────────────────────────
        # Le connessioni WS sono long-lived: i default di 60s chiuderebbero
        # connessioni idle legittimamente aperte (es. giocatore AFK).
        # Il heartbeat del backend (ogni 30s) mantiene vive le connessioni.
        # Valori conservativi: 1 ora. Abbassare se le sessioni sono più brevi.
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout   15s;

        # ── Buffering ─────────────────────────────────────────────────────────
        # OBBLIGATORIO disabilitare per WebSocket:
        # il buffering introduce latenza nei messaggi bidirezionali.
        proxy_buffering off;

        # ── Rate limiting ─────────────────────────────────────────────────────
        # Limita gli handshake iniziali (non i frame successivi).
        # burst=20: accetta picchi fino a 20 handshake simultanei per IP.
        limit_req zone=ws_limit burst=20 nodelay;
    }


    # ══════════════════════════════════════════════════════════════════════════
    # REST API  →  /api/*
    # ══════════════════════════════════════════════════════════════════════════

    location /api/ {
        proxy_pass         http://backend_ws;   # stesso pool, algoritmo least_conn
        proxy_http_version 1.1;

        # Per keepalive verso upstream: Connection deve essere vuoto (non "close")
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;

        # Rate limiting più restrittivo per le API REST
        limit_req zone=api_limit burst=50 nodelay;
    }


    # ══════════════════════════════════════════════════════════════════════════
    # HEALTH CHECK  →  /health
    # ══════════════════════════════════════════════════════════════════════════
    # Usato da K8s liveness probe e dal docker-compose healthcheck.
    # Non loggato per non inquinare i log di produzione.

    location = /health {
        proxy_pass         http://backend_ws;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }


    # ══════════════════════════════════════════════════════════════════════════
    # FRONTEND  →  / (catch-all)
    # ══════════════════════════════════════════════════════════════════════════

    location / {
        proxy_pass         http://frontend_pool;
        proxy_http_version 1.1;

        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;

        # Fallback SPA: se il frontend restituisce 404, serve index.html.
        # Necessario per Vue Router in modalità history.
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend_pool/index.html;
        proxy_set_header Host $host;
    }


    # ══════════════════════════════════════════════════════════════════════════
    # NGINX STATUS  →  /nginx_status  (solo da localhost, per Prometheus)
    # ══════════════════════════════════════════════════════════════════════════

    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 172.16.0.0/12;    # range reti Docker/K8s
        deny  all;
        access_log off;
    }
}