# ─────────────────────────────────────────────────────────────────────────────
# Virtual host principale.
#
# Il backend è referenziato tramite variabile ($backend) invece che con un
# blocco upstream statico. Questo permette a NGINX di avviarsi anche quando
# i container backend non sono ancora up, risolvendo il DNS a ogni richiesta
# grazie al resolver 127.0.0.11 configurato in nginx.conf.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Indirizzo backend come variabile: risolto dinamicamente via DNS Docker
    set $backend "backend:8000";

    # ── Sicurezza header ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ══════════════════════════════════════════════════════════════════════════
    # WEBSOCKET  →  /ws/<room_id>
    # ══════════════════════════════════════════════════════════════════════════
    location /ws/ {
        proxy_pass         http://$backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout   15s;

        proxy_buffering off;

        limit_req zone=ws_limit burst=20 nodelay;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # REST API  →  /api/*
    # ══════════════════════════════════════════════════════════════════════════
    location /api/ {
        proxy_pass         http://$backend;
        proxy_http_version 1.1;

        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;

        limit_req zone=api_limit burst=50 nodelay;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HEALTH CHECK  →  /health
    # ══════════════════════════════════════════════════════════════════════════
    location = /health {
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # FRONTEND  →  / (catch-all)
    # ══════════════════════════════════════════════════════════════════════════
    location / {
        proxy_pass         http://frontend_pool;
        proxy_http_version 1.1;

        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;

        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        rewrite ^ /index.html break;
        proxy_pass http://frontend_pool;
        proxy_set_header Host $host;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # NGINX STATUS  →  /nginx_status  (solo reti interne)
    # ══════════════════════════════════════════════════════════════════════════
    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny  all;
        access_log off;
    }
}