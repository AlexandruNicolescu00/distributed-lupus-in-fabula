# ─────────────────────────────────────────────────────────────────────────────
# Reverse proxy principale — gestisce routing WebSocket e load balancing
# verso le istanze backend FastAPI.
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;                 # un worker per core CPU
worker_rlimit_nofile 65535;             # max file descriptor per worker

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;                          # multiplexing I/O ottimizzato su Linux
    multi_accept on;                    # accetta più connessioni per ciclo
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    # Formato esteso: include upstream_addr per tracciare quale istanza ha gestito
    # la richiesta, e $upstream_response_time per misurare latenza backend.
    log_format main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" '
        'upstream="$upstream_addr" '
        'upstream_time=$upstream_response_time '
        'request_time=$request_time';

    # Formato dedicato per le connessioni WebSocket (upgrade = sì/no)
    log_format websocket
        '$remote_addr [$time_local] '
        '"$http_upgrade" $status '
        'upstream="$upstream_addr" '
        'request_time=$request_time';

    access_log /var/log/nginx/access.log    main;
    access_log /var/log/nginx/websocket.log websocket if=$is_websocket;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;             # non esporre versione NGINX negli header

    # ── Buffer ────────────────────────────────────────────────────────────────
    proxy_buffers          8 16k;
    proxy_buffer_size      16k;
    client_max_body_size   1m;

    # ── Variabile: rilevamento upgrade WebSocket ──────────────────────────────
    # Usata per il log condizionale e per la gestione degli header.
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # Variabile booleana per il log condizionale WS
    map $http_upgrade $is_websocket {
        websocket  1;
        default    0;
    }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Zona condivisa tra i worker: 10MB ≈ 160.000 IP tracciabili
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m    rate=10r/s;
    limit_req_status 429;

    # ── Upstream: backend WebSocket (least_conn) ──────────────────────────────
    #
    # least_conn: assegna la nuova connessione all'istanza con meno connessioni
    # attive. È l'algoritmo migliore per WebSocket perché le connessioni sono
    # long-lived e hanno peso diverso rispetto alle HTTP brevi.
    #
    # keepalive 64: mantiene fino a 64 connessioni persistenti aperte verso i
    # backend nel pool del worker. Riduce l'overhead di TCP handshake per le
    # richieste HTTP/REST ma NON si applica alle connessioni WS (che restano
    # aperte per tutta la durata della sessione).
    upstream backend_ws {
        least_conn;
        server backend:8000;            # Docker/K8s DNS risolve tutte le repliche
        keepalive 64;
    }

    # ── Upstream alternativo con sticky sessions (ip_hash) ────────────────────
    #
    # QUANDO USARLO: se il backend mantiene stato locale non condiviso su Redis
    # (es. durante la migrazione iniziale prima che il Pub/Sub sia completo).
    # Con l'architettura Redis Pub/Sub della Task 2.1, ip_hash NON è necessario.
    #
    # Per attivarlo: sostituire "backend_ws" con "backend_ws_sticky"
    # nel location /ws del file conf.d/game.conf.
    #
    # LIMITAZIONE: ip_hash è una sticky session approssimata. Non funziona bene
    # dietro a NAT o IPv6. La soluzione corretta (sticky cookie) richiede
    # NGINX Plus o il modulo nginx-sticky-module-ng.
    upstream backend_ws_sticky {
        ip_hash;
        server backend:8000;
    }

    # ── Upstream frontend ─────────────────────────────────────────────────────
    upstream frontend_pool {
        server frontend:3000;
        keepalive 16;
    }

    include /etc/nginx/conf.d/*.conf;
}