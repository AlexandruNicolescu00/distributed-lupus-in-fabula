# ─────────────────────────────────────────────────────────────────────────────
# redis.conf — Configurazione Redis per ambiente di sviluppo locale
# Stack: Redis 7.2
# Usato da: docker-compose.yml (volume mount) e ConfigMap Kubernetes
# ─────────────────────────────────────────────────────────────────────────────


# ══════════════════════════════════════════════════════════════
# RETE & ACCESSO
# ══════════════════════════════════════════════════════════════

# Ascolta su tutte le interfacce (necessario in Docker/K8s)
bind 0.0.0.0

# Porta standard
port 6379

# Disabilita modalità protetta (il network isolation è gestito da Docker/K8s)
protected-mode no

# Timeout connessioni idle (0 = mai). In produzione mettere 300.
timeout 0

# Keepalive TCP: invia ACK ogni N secondi per rilevare client disconnessi
tcp-keepalive 60

# Backlog connessioni in attesa
tcp-backlog 511

# Numero massimo di client connessi contemporaneamente
maxclients 1000


# ══════════════════════════════════════════════════════════════
# PERSISTENZA — RDB (snapshot)
# ══════════════════════════════════════════════════════════════
#
# RDB salva uno snapshot binario del dataset su disco.
# Sintassi: save <secondi> <numero_di_modifiche>
# Redis esegue lo snapshot se ENTRAMBE le condizioni sono soddisfatte.
#
# Strategia sviluppo locale (aggressiva, per non perdere dati tra restart):
#   - ogni 60s se ci sono state almeno 1 modifica
#   - ogni 30s se ci sono state almeno 10 modifiche
#   - ogni 10s se ci sono state almeno 100 modifiche

save 60 1
save 30 10
save 10 100

# In produzione usare valori più conservativi, es:
#   save 3600 1
#   save 300 100
#   save 60 10000

# Blocca le scritture se il background save fallisce (segnale di errore esplicito)
stop-writes-on-bgsave-error yes

# Compressione LZF per le stringhe nell'RDB (risparmio disco, overhead CPU minimo)
rdbcompression yes

# Checksum CRC64 alla fine del file RDB per integrità
rdbchecksum yes

# Nome del file snapshot
dbfilename dump.rdb

# Directory dove salvare dump.rdb e appendonly.aof
dir /data


# ══════════════════════════════════════════════════════════════
# PERSISTENZA — AOF (Append Only File)
# ══════════════════════════════════════════════════════════════
#
# AOF registra ogni operazione di scrittura in un log sequenziale.
# Garantisce durabilità molto più alta di RDB: al riavvio Redis
# riproduce il log e ricostruisce il dataset esatto.
#
# RDB + AOF insieme = massima fault tolerance:
#   - Al riavvio Redis usa AOF (più aggiornato) se presente
#   - RDB serve come backup compresso e per restore rapido

# Abilita AOF
appendonly yes

# Nome del file AOF
appendfilename "appendonly.aof"

# Politica di fsync:
#   always   → fsync ad ogni scrittura (massima durabilità, I/O alto)
#   everysec → fsync ogni secondo (buon compromesso, perdita max 1s di dati)
#   no       → lascia decidere al kernel (più veloce, meno sicuro)
#
# Per sviluppo locale: everysec è il giusto compromesso
appendfsync everysec

# Non eseguire fsync durante la riscrittura in background del file AOF
# (evita lag I/O su sistemi lenti, accettabile in sviluppo)
no-appendfsync-on-rewrite yes

# Riscrittura automatica AOF: compatta il file quando cresce oltre
# una certa soglia rispetto all'ultima riscrittura
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Tollerance per AOF troncato (file corrotto alla fine per crash)
# yes = carica i dati fino al punto valido, logga l'avviso
aof-use-rdb-preamble yes

# Il file AOF inizia con un blocco RDB compresso, poi log incrementale.
# Velocizza enormemente il riavvio su dataset grandi.


# ══════════════════════════════════════════════════════════════
# MEMORIA
# ══════════════════════════════════════════════════════════════

# Limite massimo di memoria usabile da Redis
# In sviluppo locale: 256MB (alzare in produzione in base al dataset)
maxmemory 256mb

# Politica di eviction quando si raggiunge maxmemory.
# Per Pub/Sub puro (nessun dato persistente critico oltre i messaggi in volo)
# allkeys-lru è ragionevole.
# Se si usano chiavi con TTL, preferire volatile-lru.
maxmemory-policy allkeys-lru

# Campioni per l'algoritmo LRU approssimato (più alto = più preciso, più CPU)
maxmemory-samples 5


# ══════════════════════════════════════════════════════════════
# PUB/SUB
# ══════════════════════════════════════════════════════════════

# Numero massimo di messaggi in coda per un client lento in Pub/Sub
# 0 = nessun limite (attenzione: può causare OOM su client disconnessi)
# 32mb = limite ragionevole per sviluppo
client-output-buffer-limit pubsub 32mb 8mb 60

# Spiegazione:
#   32mb → hard limit: se il buffer supera 32MB il client viene disconnesso
#   8mb  → soft limit
#   60   → secondi: se rimane sopra il soft limit per 60s viene disconnesso


# ══════════════════════════════════════════════════════════════
# SLOW LOG (debugging performance)
# ══════════════════════════════════════════════════════════════

# Log comandi più lenti di N microsecondi (1000 = 1ms)
slowlog-log-slower-than 1000

# Quante entry conservare nel slow log
slowlog-max-len 128


# ══════════════════════════════════════════════════════════════
# LOGGING
# ══════════════════════════════════════════════════════════════

# Livelli: debug, verbose, notice, warning
# In sviluppo: notice (bilanciato)
loglevel notice

# Log su stdout (Docker/K8s raccoglie lo stdout del container)
logfile ""


# ══════════════════════════════════════════════════════════════
# KERNEL TUNING (note per l'host)
# ══════════════════════════════════════════════════════════════
#
# Redis loggerà WARNING se questi parametri non sono configurati sull'host.
# Per sopprimere i warning in sviluppo locale, eseguire sull'host:
#
#   sudo sysctl -w vm.overcommit_memory=1
#   sudo sysctl -w net.core.somaxconn=511
#   echo never > /sys/kernel/mm/transparent_hugepage/enabled
#
# In Docker Compose è già configurato `sysctls: net.core.somaxconn: 511`
# Per vm.overcommit_memory aggiungere al docker-compose.yml:
#   sysctls:
#     vm.overcommit_memory: 1