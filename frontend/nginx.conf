# NGINX interno al container frontend — serve i file statici Vue
# Nota: questo è diverso da infrastructure/nginx/ che è il reverse proxy esterno

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressione gzip per assets statici
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache aggressiva per assets con hash nel nome (es. main.a1b2c3.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: tutte le route non trovate → index.html
    # Necessario per Vue Router in modalità history
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint (usato dal HEALTHCHECK del Dockerfile)
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}