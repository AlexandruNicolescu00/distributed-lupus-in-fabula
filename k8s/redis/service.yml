# ─────────────────────────────────────────────────────────────────────────────
# ClusterIP: Redis non deve essere raggiungibile dall'esterno del cluster.
# I backend lo raggiungono tramite DNS interno:
#   redis.game.svc.cluster.local:6379
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: game
  labels:
    app: redis
    app.kubernetes.io/part-of: game-platform
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP