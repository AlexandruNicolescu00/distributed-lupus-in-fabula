# ─────────────────────────────────────────────────────────────────────────────
# Deployment e Service per redis_exporter.
# Espone le metriche di Redis su :9121/metrics per Prometheus.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: game
  labels:
    app: redis-exporter
    app.kubernetes.io/part-of: game-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9121"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.58.0
          ports:
            - containerPort: 9121
              name: metrics
          env:
            - name: REDIS_ADDR
              # Usa il Service ClusterIP di Redis interno al cluster
              value: "redis://redis.game.svc.cluster.local:6379"
          resources:
            requests:
              cpu:    "10m"
              memory: "32Mi"
            limits:
              cpu:    "50m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9121
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: game
  labels:
    app: redis-exporter
    app.kubernetes.io/part-of: game-platform
spec:
  type: ClusterIP
  selector:
    app: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: 9121
      protocol: TCP