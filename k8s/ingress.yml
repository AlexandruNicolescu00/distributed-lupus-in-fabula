# ─────────────────────────────────────────────────────────────────────────────
# Ingress NGINX per routing del traffico esterno verso i servizi interni.
#
# Prerequisiti:
#   minikube addons enable ingress
#   # oppure su cluster reale:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
#
# In locale con minikube, ottenere l'IP con:
#   minikube ip          → es. 192.168.49.2
# Aggiungere al /etc/hosts:
#   192.168.49.2   game.local
#
# Routing:
#   game.local/ws/*  → backend:8000   (WebSocket)
#   game.local/api/* → backend:8000   (REST)
#   game.local/      → frontend:3000  (Vue SPA)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: game-ingress
  namespace: game
  labels:
    app.kubernetes.io/part-of: game-platform
  annotations:
    # ── Controller ────────────────────────────────────────────────────────────
    # ingressClassName sostituisce la annotation deprecata kubernetes.io/ingress.class
    # (vedi anche spec.ingressClassName sotto)

    # ── WebSocket ─────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-read-timeout:    "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout:    "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "15"
    nginx.ingress.kubernetes.io/proxy-buffering:       "off"
    nginx.ingress.kubernetes.io/proxy-set-headers:     "game/custom-headers"

    # ── Load balancing ────────────────────────────────────────────────────────
    # Valori validi: round_robin | ewma | ip_hash
    # Per i WebSocket usiamo round_robin: ogni nuova connessione va all'endpoint
    # successivo, distribuendo le connessioni long-lived in modo uniforme.
    # NB: ewma NON è adatto qui — bilancia sulla latenza di RISPOSTA, che per una
    # connessione persistente arriva solo alla chiusura: durante il test non ha
    # segnale e concentra tutte le connessioni sullo stesso pod.
    nginx.ingress.kubernetes.io/load-balance: "round_robin"

    # ── Corpo richiesta ───────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Limiti PER IP SORGENTE, validi per tutto l'Ingress. Vanno tenuti sopra il
    # carico atteso da un singolo IP: un load test che apre N connessioni
    # WebSocket long-lived dalla stessa macchina occupa N slot di limit-connections
    # contemporaneamente; se il limite è ~N, la connessione N+1 (inclusa
    # l'apertura di Grafana dallo stesso IP) viene rifiutata con 503.
    # NB: il monitoraggio (/grafana, /prometheus) è su un Ingress separato senza
    # questi limiti (vedi game-ingress-monitoring più sotto), così non viene mai
    # strozzato dal traffico di gioco.
    # limit-connections: max connessioni simultanee per IP
    # limit-rps: max nuove connessioni al secondo per IP
    nginx.ingress.kubernetes.io/limit-connections: "1000"
    nginx.ingress.kubernetes.io/limit-rps:         "300"

spec:
  ingressClassName: nginx
  rules:
    - host: game.local     # cambiare con il dominio reale in produzione

      http:
        paths:
          # ── WebSocket (/ws/) ──────────────────────────────────────────────
          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # ── REST API (/api/) ──────────────────────────────────────────────
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # ── Health check ──────────────────────────────────────────────────
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000

          # ── Frontend (catch-all) ──────────────────────────────────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000

---
# ─────────────────────────────────────────────────────────────────────────────
# Ingress dedicato al MONITORAGGIO (Grafana / Prometheus).
# Separato da game-ingress di proposito: NON ha i rate-limit per-IP del gameplay,
# così durante un load test (che satura limit-connections sull'IP sorgente) la
# dashboard resta raggiungibile e non risponde più 503.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: game-ingress-monitoring
  namespace: game
  labels:
    app.kubernetes.io/part-of: game-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: game.local
      http:
        paths:
          # ── Grafana ──────────────────────────────────────────────────────
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

          # ── Prometheus ───────────────────────────────────────────────────
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090

---
# ConfigMap per custom headers inoltrati al backend
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: game
data:
  X-Forwarded-Proto: "$scheme"
  X-Real-IP:         "$remote_addr"