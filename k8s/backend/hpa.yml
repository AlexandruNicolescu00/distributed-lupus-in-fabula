# ─────────────────────────────────────────────────────────────────────────────
# HorizontalPodAutoscaler per il backend.
#
# Prerequisito: metrics-server installato nel cluster.
#   minikube addons enable metrics-server
#
# Logica di scaling:
#   - Scala UP  quando la CPU media supera il 60% per più di 15s
#   - Scala DOWN quando la CPU scende sotto il 60% per più di 5 minuti
#     (stabilizationWindowSeconds evita flapping)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: game
  labels:
    app: backend
    app.kubernetes.io/part-of: game-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend

  minReplicas: 2
  maxReplicas: 8

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # scala prima: 50% invece di 60%

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    # Scale UP aggressivo: reagisce ai picchi di connessioni WebSocket
    scaleUp:
      stabilizationWindowSeconds: 0     # nessuna attesa: scala immediatamente
      policies:
        - type: Pods
          value: 2                      # aggiungi 2 pod alla volta
          periodSeconds: 15             # ogni 15s invece di 30s

    # Scale DOWN conservativo: evita di disconnettere client WS
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

# ─────────────────────────────────────────────────────────────────────────────
# P14 — Scaling su METRICA DI CONNESSIONI (consigliato per workload WebSocket)
# ─────────────────────────────────────────────────────────────────────────────
# Il backend è I/O/connessioni-bound, non CPU-bound: molte WS idle = CPU bassa ma
# carico (memoria/file descriptor/fan-out) alto. La CPU è quindi un segnale di
# scaling poco allineato (rif. teoria: scalabilità; osservabilità — scegliere la
# metrica giusta). La metrica già esposta `ws_active_connections` è più indicativa.
#
# PREREQUISITO: Prometheus Adapter installato nel cluster, che espone
# `ws_active_connections` come Pods metric all'API custom.metrics.k8s.io.
#   helm install prometheus-adapter prometheus-community/prometheus-adapter \
#     -n game --set prometheus.url=http://prometheus.game.svc
#
# Una volta disponibile la metrica, aggiungere il seguente blocco a `spec.metrics`
# del HPA sopra (l'HPA scala sul MASSIMO tra le metriche, quindi convive con CPU):
#
#   - type: Pods
#     pods:
#       metric:
#         name: ws_active_connections
#       target:
#         type: AverageValue
#         averageValue: "80"   # ~80 connessioni WS attive per pod → scale-up
#
# Lasciato commentato per non rompere `kubectl apply -f k8s/backend/` su cluster
# senza Prometheus Adapter (l'HPA andrebbe in errore sulla metrica mancante).